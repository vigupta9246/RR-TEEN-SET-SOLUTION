<!-- FONTS UPGRADE — already in index.html, baaki pages mein bhi add karo -->
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ── ANIMATIONS UPGRADE (paste in every page's <style> or link animations.css) ── */
:root{--anim-fast:.25s;--anim-med:.45s;--anim-slow:.75s;--ease-out:cubic-bezier(.22,1,.36,1);--ease-spring:cubic-bezier(.34,1.56,.64,1);--ease-smooth:cubic-bezier(.4,0,.2,1)}
html{scroll-behavior:smooth;scroll-padding-top:80px}
body{font-family:'DM Sans','Nunito',sans-serif!important;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4,h5,h6{font-family:'Bebas Neue',sans-serif!important;letter-spacing:1.5px}
.tag,.stat-lbl,.logo-tag,.nav-links a{font-family:'Space Grotesk',sans-serif!important}
.section-title span{background:linear-gradient(120deg,#ff6f00 0%,#ff9100 40%,#ffb300 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#scroll-progress{position:fixed;top:0;left:0;height:3px;width:0%;background:linear-gradient(90deg,#ff6f00,#ff9100,#ffb300);z-index:9999;transition:width .1s linear;border-radius:0 2px 2px 0;box-shadow:0 0 10px rgba(255,111,0,.7)}
.reveal{opacity:0;transform:translateY(36px);transition:opacity var(--anim-slow) var(--ease-out),transform var(--anim-slow) var(--ease-out);will-change:opacity,transform}
.reveal.is-visible{opacity:1;transform:translateY(0)}
.reveal-left{opacity:0;transform:translateX(-48px);transition:opacity var(--anim-slow) var(--ease-out),transform var(--anim-slow) var(--ease-out)}
.reveal-right{opacity:0;transform:translateX(48px);transition:opacity var(--anim-slow) var(--ease-out),transform var(--anim-slow) var(--ease-out)}
.reveal-left.is-visible,.reveal-right.is-visible{opacity:1;transform:none}
nav{transition:background var(--anim-med) var(--ease-smooth),box-shadow var(--anim-med) var(--ease-smooth)!important}
nav.scrolled{background:rgba(10,22,40,.97)!important;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 4px 30px rgba(0,0,0,.4)!important}
.nav-links a{position:relative;transition:color var(--anim-fast)!important}
.nav-links a::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:2px;background:linear-gradient(90deg,#ff6f00,#ff9100);border-radius:2px;transition:width var(--anim-med) var(--ease-out)}
.nav-links a:hover::after,.nav-links a.active::after{width:100%}
.dropdown{transform-origin:top center;opacity:0;transform:translateY(-8px) scaleY(.95);visibility:hidden;transition:opacity var(--anim-fast) var(--ease-smooth),transform var(--anim-fast) var(--ease-smooth),visibility var(--anim-fast)}
.has-dropdown:hover .dropdown{opacity:1;transform:none;visibility:visible}
.dropdown a{transition:background var(--anim-fast),padding-left var(--anim-fast) var(--ease-smooth)!important}
.dropdown a:hover{padding-left:20px!important}
.btn,a[class*="btn"]{position:relative;overflow:hidden;transition:transform var(--anim-fast) var(--ease-spring),box-shadow var(--anim-fast)!important}
.btn:hover,a[class*="btn"]:hover{transform:translateY(-3px) scale(1.02)!important}
.btn:active,a[class*="btn"]:active{transform:translateY(0) scale(.98)!important}
[class*="card"]:hover,.service-card:hover,.blog-card:hover,.project-card:hover{transform:translateY(-8px) scale(1.01)!important;box-shadow:0 20px 60px rgba(0,0,0,.3),0 6px 20px rgba(255,111,0,.12)!important;transition:transform .45s cubic-bezier(.34,1.56,.64,1),box-shadow .45s!important}
.feat-list li{transition:transform var(--anim-fast) var(--ease-spring),color var(--anim-fast);cursor:default}
.feat-list li:hover{transform:translateX(6px);color:#ff9100!important}
a[href*="whatsapp"]{position:relative}
a[href*="whatsapp"]::before{content:'';position:absolute;inset:-4px;border-radius:inherit;border:2px solid rgba(37,211,102,.5);animation:waPulse 2.5s ease-in-out infinite;pointer-events:none}
@keyframes waPulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:0;transform:scale(1.12)}}
input:focus,textarea:focus,select:focus{transform:scale(1.01)!important;box-shadow:0 0 0 3px rgba(255,111,0,.2),0 4px 16px rgba(0,0,0,.15)!important}
#mob-menu a{transition:padding-left var(--anim-fast),color var(--anim-fast)!important}
#mob-menu a:hover{padding-left:28px!important}
@keyframes ripple{to{transform:scale(2.5);opacity:0}}
#cursor-glow{position:fixed;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(255,111,0,.06) 0%,transparent 70%);pointer-events:none;z-index:0;transform:translate(-50%,-50%);transition:left .08s ease,top .08s ease;will-change:left,top}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}.reveal,.reveal-left,.reveal-right{opacity:1!important;transform:none!important}}
</style>

<!--
  STEP 2 — </body> se pehle yeh script paste karo:
  ──────────────────────────────────────────────────
-->

<div id="scroll-progress"></div>

<script>
(function(){
  'use strict';
  var bar=document.getElementById('scroll-progress');
  window.addEventListener('scroll',function(){
    if(bar) bar.style.width=(window.scrollY/(document.documentElement.scrollHeight-window.innerHeight)*100)+'%';
  },{passive:true});
  var nav=document.querySelector('nav');
  window.addEventListener('scroll',function(){
    if(nav) nav.classList.toggle('scrolled',window.scrollY>60);
  },{passive:true});
  var io=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(!e.isIntersecting) return;
      e.target.classList.add('is-visible');
      io.unobserve(e.target);
    });
  },{threshold:.12,rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('section,.grid-2,.feat-list,h2,.stats-bar').forEach(function(el){
    if(!el.classList.contains('reveal')&&!el.classList.contains('reveal-left')&&!el.classList.contains('reveal-right')){
      el.classList.add('reveal');
    }
    io.observe(el);
  });
  document.querySelectorAll('.reveal,.reveal-left,.reveal-right').forEach(function(el){ io.observe(el); });
  document.querySelectorAll('.btn,.nav-cta,.mob-cta-btn').forEach(function(btn){
    btn.addEventListener('click',function(e){
      var r=this.getBoundingClientRect();
      var rpl=document.createElement('span');
      var sz=Math.max(r.width,r.height);
      rpl.style.cssText='position:absolute;border-radius:50%;background:rgba(255,255,255,.28);width:'+sz+'px;height:'+sz+'px;left:'+(e.clientX-r.left-sz/2)+'px;top:'+(e.clientY-r.top-sz/2)+'px;transform:scale(0);animation:ripple .55s ease-out forwards;pointer-events:none';
      this.style.position='relative'; this.style.overflow='hidden';
      this.appendChild(rpl);
      setTimeout(function(){ rpl.remove(); },600);
    });
  });
  if(window.matchMedia('(pointer:fine)').matches){
    var g=document.createElement('div'); g.id='cursor-glow';
    document.body.appendChild(g);
    window.addEventListener('mousemove',function(ev){
      g.style.left=ev.clientX+'px'; g.style.top=ev.clientY+'px';
    },{passive:true});
  }
  var pg=location.pathname.split('/').pop()||'index.html';
  document.querySelectorAll('.nav-links a').forEach(function(a){
    if(a.getAttribute('href')===pg) a.classList.add('active');
  });
})();
</script>
